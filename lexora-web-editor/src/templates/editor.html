{% extends "base.html" %}

{% block title %}Lexora IDE - Design your logic{% endblock %}

{% block content %}
<div class="editor-wrapper">
    <div class="editor-toolbar">
        <div class="toolbar-left">
            <span class="file-badge" id="filename-display">main.lx</span>
        </div>
        <div class="toolbar-right">
            <!-- File Operations -->
            <button id="upload-button" class="btn-tool" title="Upload .lx file">
                <i class="fas fa-upload"></i>
            </button>
            <button id="download-button" class="btn-tool" title="Download .lx file">
                <i class="fas fa-download"></i>
            </button>
            <div class="toolbar-separator"></div>
            
            <button id="clear-button" class="btn-tool" title="Clear console">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button id="run-button" class="btn-run">
                <i class="fas fa-play"></i> Run Script
            </button>
        </div>
        
        <!-- Hidden file input for upload -->
        <input type="file" id="file-input" accept=".lx,.txt" style="display: none;">
    </div>
    
    <div class="editor-main">
        <div class="editor-pane">
            <div class="pane-label">Editor</div>
            <textarea id="code-editor"># New Lexora Logic
# Functions with parameters
Define greet with name as:
    Display "Hello, ", name
End

Call greet with "Ashish"

# Repeat loops
Repeat 3 times:
    Display "Looping..."
End

# Lists
Set fruits to []
Append "Apple" to fruits
Append "Mango" to fruits
Display "My list: ", fruits</textarea>
        </div>
        
        <div class="output-pane">
            <div class="pane-label">Console</div>
            <div id="output-area" class="output-content"></div>
        </div>
    </div>
</div>

<style>
.file-badge {
    background: rgba(255,255,255,0.05);
    padding: 0.25rem 0.75rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
    border: 1px solid var(--border);
}

.btn-tool {
    background: none;
    border: none;
    color: var(--text-mid);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.5rem;
    transition: color 0.2s;
}

.btn-tool:hover {
    color: #ff4d4d;
}

.btn-run {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.5rem 1.5rem;
    border-radius: 8px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    transition: all 0.2s;
}

.btn-run:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 15px var(--accent-glow);
}

.toolbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
}

.toolbar-separator {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.2);
}

#file-input {
    display: none;
}

.output-content {
    white-space: pre-wrap; /* Preserve newlines and spaces */
    word-wrap: break-word;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.875rem;
    line-height: 1.6;
}
</style>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/material-ocean.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>
{% endblock %}
